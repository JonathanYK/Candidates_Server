
name: CI Pulumi Deployment to Development

on:
  push:
    branches:  
      - '*'
    paths-ignore:
      - 'main/**'
  pull_request:
    branches: 
      - '*'
    paths-ignore:
      - 'main/**'

  workflow_dispatch:

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Install Pulumi CLI
        uses: pulumi/setup-pulumi@v2
          
          
      - name: After setting up the Pulumi project specific language environment, we need to install the dependencies also
        run: npm install

      - name: Check and update Pulumi SDK version
        run: |
         echo "Checking Pulumi SDK version..."
         LATEST_SDK_VERSION=$(curl -s https://www.npmjs.com/package/@pulumi/pulumi | grep 'Latest version' | sed -E 's/^.*\(([0-9]+\.[0-9]+\.[0-9]+)\).*$/\1/')
         INSTALLED_SDK_VERSION=$(pulumi version --json | jq -r '.version')
         if [[ $LATEST_SDK_VERSION != $INSTALLED_SDK_VERSION ]]; then
            echo "Updating Pulumi SDK to version $LATEST_SDK_VERSION..."
            npm install -g @pulumi/pulumi@"$LATEST_SDK_VERSION"
         else
            echo "Pulumi SDK is up to date."
         fi


        
      - name: Login to Pulumi
        run: |
          echo "Logging into Pulumi..."
          pulumi login --cloud-url https://api.pulumi.com
          export PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Deploy Pulumi Stack
        run: |
          echo "Deploying main branch to development environment..."
          pulumi stack select JonathanYK/candidatesP/dev
          pulumi up --yes


      - name: Finish message
        run: echo "Finished development deployment"

