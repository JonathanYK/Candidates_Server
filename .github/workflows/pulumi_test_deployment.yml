
name: CI Pulumi Deployment to Development

on:
  push:
    branches:  
      - '*'
    paths-ignore:
      - 'main/**'
  pull_request:
    branches: 
      - '*'
    paths-ignore:
      - 'main/**'

  workflow_dispatch:

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
  
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: In order to use the Pulumi v2 action, we need to setup the Pulumi project specific language environment
        uses: actions/setup-node@v2
        with:
          node-version: '14'
          
          
      - name: After setting up the Pulumi project specific language environment, we need to install the dependencies also
        run: npm install

      - name: Install Pulumi CLI
        uses: setup-pulumi@v2

      - uses: pulumi/actions@v2
        with:
          command: preview
          stack-name: dev
          
        
      - name: Login to Pulumi
        run: |
          echo "Logging into Pulumi..."
          pulumi login --cloud-url https://api.pulumi.com
          export PULUMI_ACCESS_TOKEN=${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Deploy Pulumi Stack
        run: |
          echo "Deploying main branch to development environment..."
          pulumi stack select JonathanYK/candidatesP/dev
          pulumi up --yes


      - name: Finish message
        run: echo "Finished development deployment"

